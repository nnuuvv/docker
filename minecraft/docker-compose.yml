  vanilla:
    container_name: minecraft-vanilla
    restart: unless-stopped
    image: itzg/minecraft-server:stable
    tty: true
    stdin_open: true
    environment:
      EULA: "TRUE"
      TYPE: "FABRIC"
      VERSION: "1.21.11"
      MEMORY: 12G
      MOTD: |
        Bananabread at work today dude? HELL YEA!
      EXISTING_WHITELIST_FILE: MERGE
      WHITELIST: |
        nnuuvv
        ViTheEgg
        keyschain
      OPS: |
        nnuuvv
      ALLOW_FLIGHT: true
      DIFFICULTY: HARD
    deploy:
      resources:
        limits:
          memory: 12G

    volumes:
      # attach the relative directory 'data' to the container's /data path
      - ./vanilla-data:/data


    ports:
      - "25565:25565"
      - "25567:25567"
    networks:
      - proxy
    labels:
      caddy_0: craft.nuv.sh
      caddy_0.tls.dns: "porkbun"
      caddy_0.tls.dns.api_key: "${API_KEY}"
      caddy_0.tls.dns.api_secret_key: "${API_SECRET}"
      caddy_0.tls.resolvers: "1.1.1.1" 
