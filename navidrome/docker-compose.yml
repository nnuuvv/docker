networks:
  proxy:
    external: true

services:
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    restart: unless-stopped
    user: 1000:1000 # should be owner of volumes
    volumes:
      - ./data:/data
      - /home/liv/Media/Audio/Music:/music:ro
    labels:
      caddy: tunes.nuv.sh
      caddy.reverse_proxy: "{{upstreams 4533}}"
    networks:
      - proxy 
